# --- Datasource (wartosci nadpisywane przez zmienne srodowiskowe z docker-compose) ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/library_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:libuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:libpass}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
# Schemat tworzy Flyway, dlatego Hibernate tylko WALIDUJE zgodnosc encji z baza
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- JWT ---
jwt.secret=${JWT_SECRET:bardzo-dlugi-sekret-minimum-256-bitow-dla-algorytmu-hs256-zmien-to}
jwt.expiration=${JWT_EXPIRATION:86400000}

# --- Swagger / OpenAPI ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# --- App ---
spring.application.name=library-fo-ruina
server.port=8080
